version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eldox_v3_postgres
    hostname: eldox-v3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_v3_data:/var/lib/postgresql/data
    networks:
      - eldox_v3
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eldox_v3_redis
    hostname: eldox-v3-redis
    restart: unless-stopped
    volumes:
      - redis_v3_data:/data
    networks:
      - eldox_v3

  minio:
    # Pinado — revisar trimestralmente. Não usar :latest em produção.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: eldox_v3_minio
    hostname: eldox-v3-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_v3_data:/data
    networks:
      - eldox_v3
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPO}/eldox-backend:latest
    container_name: eldox_v3_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health > /dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@eldox-v3-postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://eldox-v3-redis:6379
      REDIS_HOST: eldox-v3-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      MINIO_ENDPOINT: eldox-v3-minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-eldox-ged}
      MINIO_USE_SSL: "false"
      # CORS: origem do frontend. main.ts também aceita wildcard *.eldox.com.br,
      # mas deixar explícito garante que mudanças de DOMAIN não quebrem o CORS.
      FRONTEND_URL: https://${DOMAIN}
    networks:
      - eldox_v3
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eldox-v3-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.eldox-v3-api.entrypoints=https"
      - "traefik.http.routers.eldox-v3-api.tls=true"
      - "traefik.http.routers.eldox-v3-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.eldox-v3-api.priority=10"
      - "traefik.http.services.eldox-v3-api.loadbalancer.server.port=3000"
      - "traefik.docker.network=coolify"

  frontend:
    image: ghcr.io/${GITHUB_REPO}/eldox-frontend:latest
    container_name: eldox_v3_frontend
    restart: unless-stopped
    # Sem healthcheck: nginx serve estático; Traefik detecta falhas via 5xx
    # em requests reais. Healthcheck com `wget` na imagem nginx:alpine base
    # quebrou roteamento no primeiro deploy (image não tinha wget em PATH
    # esperado → container marcado unhealthy → Traefik parou de rotear →
    # raiz retornava 503 "no available server").
    networks:
      - eldox_v3
      - coolify
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.eldox-v3-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.eldox-v3-web.entrypoints=https"
      - "traefik.http.routers.eldox-v3-web.tls=true"
      - "traefik.http.routers.eldox-v3-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.eldox-v3-web.priority=1"
      - "traefik.http.services.eldox-v3-web.loadbalancer.server.port=80"
      # HTTP router (required for ACME HTTP-01 challenge)
      - "traefik.http.routers.eldox-v3-web-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.eldox-v3-web-http.entrypoints=http"
      - "traefik.http.routers.eldox-v3-web-http.priority=1"
      - "traefik.http.routers.eldox-v3-web-http.service=eldox-v3-web"
      - "traefik.docker.network=coolify"

  # ──────────────────────────────────────────────────────────────────────────
  # Backup diário do PostgreSQL → MinIO (bucket `backups`), retenção 30 dias.
  # Rodar restore: ver docs/runbooks/backup-restore.md.
  # ──────────────────────────────────────────────────────────────────────────
  backup:
    build:
      context: ./backup
    container_name: eldox_v3_backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      POSTGRES_HOST: eldox-v3-postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_ENDPOINT: eldox-v3-minio
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      BACKUP_BUCKET: ${BACKUP_BUCKET:-backups}
      TZ: ${TZ:-UTC}
    networks:
      - eldox_v3

networks:
  eldox_v3:
    driver: bridge
  coolify:
    external: true

volumes:
  postgres_v3_data:
  redis_v3_data:
  minio_v3_data:
